<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critical Minerals Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Critical Minerals <span>Tracker</span></h1>
      <nav>
        <button id="nav-deals" class="active" onclick="switchTab('deals')">Policies &amp; Deals</button>
        <button id="nav-projects" onclick="switchTab('projects')">Mines &amp; Refineries</button>
        <button id="nav-prices" onclick="switchTab('prices')">Price Movements</button>
      </nav>
    </header>

    <div class="body">
      <button id="filter-toggle" onclick="toggleFilters()">Filters <span id="filter-arrow">▼</span></button>
      <aside></aside>

      <main>
        <!-- Trade & Investment -->
        <div id="section-deals" class="section active">
          <div class="section-header">
            <h2>Critical Minerals Policies <span class="count-badge" id="deals-count">0</span></h2>
            <p>Trade controls, subsidies, investment deals, and bilateral agreements</p>
          </div>
          <div class="deal-list" id="deals-list"></div>
        </div>

        <!-- Mines & Refineries -->
        <div id="section-projects" class="section">
          <div class="section-header">
            <h2>Mines &amp; Refineries <span class="count-badge" id="projects-count">0</span></h2>
            <p>Global critical mineral facilities</p>
          </div>
          <div id="facilities-map"></div>
          <div id="map-legend" class="map-legend"></div>
          <div id="projects-list"></div>
        </div>

        <!-- Price Movements -->
        <div id="section-prices" class="section">
          <div class="section-header">
            <h2>Historical Prices</h2>
            <p>Monthly commodity prices · <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener noreferrer" style="color:var(--text-muted);text-decoration:none;font-size:12px">Federal Reserve Bank of St. Louis (FRED)</a></p>
          </div>
          <div id="fred-container">
            <div class="loading-row"><span class="spinner"></span> Loading…</div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
